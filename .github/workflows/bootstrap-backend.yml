---
name: "Bootstrap Terraform Backend"

on:
  workflow_dispatch:
    inputs:
      location:
        description: "Azure region for backend resources"
        required: true
        default: "eastus2"
      resource_group_name:
        description: "Resource group for Terraform state backend"
        required: true
        default: "rg-finopsiq-tfstate"
      storage_account_prefix:
        description: "Storage account prefix; random suffix will be appended"
        required: true
        default: "stfinopsiqtfstate"
      container_name:
        description: "Blob container name for Terraform state"
        required: true
        default: "tfstate"

permissions:
  contents: read
  id-token: write
  actions: write

concurrency:
  group: terraform-backend-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap-backend:
    name: Reusable Bootstrap Backend
    uses: AzureFinOpsIQ/FinOPsIQ-Workflows/.github/workflows/terraform-bootstrap-backend.yml@main
    with:
      location: ${{ inputs.location }}
      resource_group_name: ${{ inputs.resource_group_name }}
      storage_account_prefix: ${{ inputs.storage_account_prefix }}
      container_name: ${{ inputs.container_name }}
    secrets:
      azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
      azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
