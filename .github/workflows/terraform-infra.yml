---
name: "Terraform Infrastructure - DEV"

on:
  schedule:
    - cron: "0 6 * * *"
  pull_request:
    branches:
      - main
    paths:
      - "modules/**"
      - "environments/**"
      - ".github/workflows/terraform-infra.yml"
  push:
    branches:
      - main
    paths:
      - "modules/**"
      - "environments/**"
      - ".github/workflows/terraform-infra.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-dev
  cancel-in-progress: false

jobs:
  terraform-dev:
    name: Reusable Terraform DEV
    uses: AzureFinOpsIQ/FinOPsIQ-Workflows/.github/workflows/terraform-infra-dev.yml@main
    with:
      tf_working_dir: environments/dev
      tf_state_key: dev/terraform.tfstate
      tf_state_resource_group: ${{ vars.TF_STATE_RESOURCE_GROUP }}
      tf_state_storage_account: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
      tf_state_container: ${{ vars.TF_STATE_CONTAINER }}
      tf_lock_timeout: 15m
    secrets:
      azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
      azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
