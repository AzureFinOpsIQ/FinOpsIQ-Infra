---
name: "Terraform Destroy - DEV"

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type Yes to generate and apply a DEV destroy plan after manual approval."
        required: true
        type: string
      destroy_mode:
        description: "Select whether to destroy only short-lived compute/network resources or the full stack."
        required: true
        type: choice
        default: compute-only
        options:
          - compute-only
          - full

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-dev
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_WORKING_DIR: environments/dev
  TF_STATE_KEY: dev/terraform.tfstate
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_STATE_RESOURCE_GROUP: ${{ vars.TF_STATE_RESOURCE_GROUP }}
  TF_STATE_STORAGE_ACCOUNT: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
  TF_STATE_CONTAINER: ${{ vars.TF_STATE_CONTAINER }}
  TF_LOCK_TIMEOUT: 15m

jobs:
  destroy_plan:
    name: "Stage 1 - Terraform Destroy Plan"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm_destroy == 'Yes'
    outputs:
      destroy_count: ${{ steps.destroy_summary.outputs.destroy_count }}
      destroy_mode: ${{ steps.destroy_summary.outputs.destroy_mode }}
      summary_text: ${{ steps.destroy_summary.outputs.summary_text }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${TF_STATE_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TF_STATE_CONTAINER}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="use_azuread_auth=true"

      - name: Remove unmanaged Key Vault secret entries from state
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform state list | grep '^azurerm_key_vault_secret\.' > keyvault-secret-state.txt || true
          if [ -s keyvault-secret-state.txt ]; then
            echo "Removing Key Vault secret data-plane resources from Terraform state because the vault is private."
            xargs -r -n1 terraform state rm < keyvault-secret-state.txt
          else
            echo "No Key Vault secret resources found in Terraform state."
          fi

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Build destroy target arguments
        id: destroy_targets
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          DESTROY_MODE: ${{ github.event.inputs.destroy_mode }}
        run: |
          echo "Selected destroy mode: ${DESTROY_MODE}"

          {
            echo "### Terraform DEV Destroy Mode"
            echo ""
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Selected destroy mode | ${DESTROY_MODE} |"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "${DESTROY_MODE}" = "full" ]; then
            echo "target_args=" >> "${GITHUB_OUTPUT}"
            {
              echo "Full destroy selected. Terraform will plan destruction for every resource in this state."
              echo ""
              echo "Preserved resources: none."
            } | tee destroy-selection-summary.txt
            exit 0
          fi

          TARGETS=(
            "module.aks"
            "module.aks_private_dns"
            "module.application_gateway"
            "module.bastion"
            "module.management_vm"
            "module.network"
            "module.private_endpoints"
            "module.workload_identity"
            "module.role_assignments.azurerm_role_assignment.this[\"acr_pull_kubelet\"]"
            "module.role_assignments.azurerm_role_assignment.this[\"agic_appgw_contributor\"]"
            "module.role_assignments.azurerm_role_assignment.this[\"agic_resource_group_reader\"]"
            "module.role_assignments.azurerm_role_assignment.this[\"agic_appgw_subnet_network_contributor\"]"
            "module.role_assignments.azurerm_role_assignment.this[\"management_vm_aks_cluster_admin\"]"
            "module.role_assignments.azurerm_role_assignment.this[\"management_vm_keyvault_reader\"]"
            "module.role_assignments.azurerm_role_assignment.this[\"management_vm_keyvault_secrets_user\"]"
          )

          TARGET_ARGS=""
          for target in "${TARGETS[@]}"; do
            TARGET_ARGS="${TARGET_ARGS} -target=${target}"
          done

          {
            echo "Compute-only destroy selected."
            echo ""
            echo "Resources/modules targeted for destroy:"
            printf -- "- %s\n" "${TARGETS[@]}"
            echo ""
            echo "Resources intentionally preserved:"
            echo "- Azure Container Registry and images"
            echo "- Key Vault and secrets"
            echo "- User Assigned Managed Identities"
            echo "- Managed identity data-plane role assignments"
            echo "- Log Analytics Workspace"
            echo "- Application Insights"
            echo "- Azure Monitor Workspace"
            echo "- Managed Grafana"
            echo "- Cosmos DB and data"
            echo "- Storage Account and containers"
            echo "- Service Bus namespace, topic, and subscriptions"
            echo "- Azure OpenAI"
            echo "- Azure AI Search"
            echo "- Terraform backend storage account"
            echo "- Resource Group"
          } | tee destroy-selection-summary.txt

          {
            echo "target_args=${TARGET_ARGS}"
          } >> "${GITHUB_OUTPUT}"

      - name: Terraform destroy plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TARGET_ARGS: ${{ steps.destroy_targets.outputs.target_args }}
        run: |
          # shellcheck disable=SC2086
          terraform plan -destroy -input=false -lock-timeout="${TF_LOCK_TIMEOUT}" ${TARGET_ARGS} -out=dev-destroy.tfplan

      - name: Generate destroy plan summary
        id: destroy_summary
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          DESTROY_MODE: ${{ github.event.inputs.destroy_mode }}
        run: |
          terraform show -json dev-destroy.tfplan > dev-destroy.tfplan.json
          DESTROY_COUNT=$(jq '[.resource_changes[]? | select(.change.actions | index("delete"))] | length' dev-destroy.tfplan.json)
          jq -r '.resource_changes[]? | select(.change.actions | index("delete")) | "- `" + .address + "`"' dev-destroy.tfplan.json > destroy-resources.txt

          if [ ! -s destroy-resources.txt ]; then
            echo "- No resources scheduled for destruction." > destroy-resources.txt
          fi

          {
            echo "### Terraform DEV Destroy Plan Summary"
            echo ""
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Selected destroy mode | ${DESTROY_MODE} |"
            echo ""
            echo "| Change Type | Count |"
            echo "|---|---:|"
            echo "| Resources to destroy | ${DESTROY_COUNT} |"
            echo ""
            echo "#### Resources that will be destroyed"
            cat destroy-resources.txt
            echo ""
            echo "#### Resources that will be preserved"
            if [ "${DESTROY_MODE}" = "full" ]; then
              echo "- None. Full destroy mode removes all resources managed by this state."
            else
              echo "- Azure Container Registry and images"
              echo "- Key Vault and secrets"
              echo "- User Assigned Managed Identities"
              echo "- Managed identity data-plane role assignments"
              echo "- Log Analytics Workspace"
              echo "- Application Insights"
              echo "- Azure Monitor Workspace"
              echo "- Managed Grafana"
              echo "- Cosmos DB and data"
              echo "- Storage Account and containers"
              echo "- Service Bus namespace, topic, and subscriptions"
              echo "- Azure OpenAI"
              echo "- Azure AI Search"
              echo "- Terraform backend storage account"
              echo "- Resource Group"
            fi
            echo ""
            echo "#### Confirmation before apply"
            echo "Review this summary and the uploaded plan artifact before approving the DEV environment gate."
          } > destroy-plan-summary.md

          cat destroy-plan-summary.md >> "${GITHUB_STEP_SUMMARY}"

          {
            echo "destroy_count=${DESTROY_COUNT}"
            echo "destroy_mode=${DESTROY_MODE}"
            echo "summary_text=Mode: ${DESTROY_MODE}, Destroy: ${DESTROY_COUNT}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload destroy plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-dev-destroy-plan
          path: |
            ${{ env.TF_WORKING_DIR }}/dev-destroy.tfplan
            ${{ env.TF_WORKING_DIR }}/dev-destroy.tfplan.json
            ${{ env.TF_WORKING_DIR }}/destroy-resources.txt
            ${{ env.TF_WORKING_DIR }}/destroy-selection-summary.txt
            ${{ env.TF_WORKING_DIR }}/destroy-plan-summary.md
          retention-days: 1

      - name: Send Slack destroy-plan notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DESTROY_SUMMARY: ${{ steps.destroy_summary.outputs.summary_text }}
          DESTROY_MODE: ${{ github.event.inputs.destroy_mode }}
        run: |
          jq -n \
            --arg environment "DEV" \
            --arg status "DESTROY PLAN READY" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg commit "${GITHUB_SHA}" \
            --arg author "${GITHUB_ACTOR}" \
            --arg summary "${DESTROY_SUMMARY}" \
            --arg mode "${DESTROY_MODE}" \
            --arg workflow_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{
              text: "Terraform destroy plan completed. Awaiting DEV environment approval.",
              blocks: [
                {type: "header", text: {type: "plain_text", text: "Terraform Destroy - PLAN READY"}},
                {type: "section", fields: [
                  {type: "mrkdwn", text: "*Environment:*\n\($environment)"},
                  {type: "mrkdwn", text: "*Status:*\n\($status)"},
                  {type: "mrkdwn", text: "*Repository:*\n\($repository)"},
                  {type: "mrkdwn", text: "*Commit:*\n\($commit)"},
                  {type: "mrkdwn", text: "*Author:*\n\($author)"},
                  {type: "mrkdwn", text: "*Destroy Mode:*\n\($mode)"},
                  {type: "mrkdwn", text: "*Destroy Plan Summary:*\n\($summary)"}
                ]},
                {type: "section", text: {type: "mrkdwn", text: "Review the saved destroy plan artifact, then approve the *dev* GitHub Environment deployment gate to destroy DEV infrastructure."}},
                {type: "actions", elements: [
                  {type: "button", text: {type: "plain_text", text: "View workflow"}, url: $workflow_url}
                ]}
              ]
            }' > slack-payload.json
          curl -fsS -X POST -H "Content-Type: application/json" --data @slack-payload.json "${SLACK_WEBHOOK_URL}"

  destroy_apply:
    name: "Stage 2 - Terraform Destroy Apply - Manual Approval Required"
    runs-on: ubuntu-latest
    needs:
      - destroy_plan
    if: github.event.inputs.confirm_destroy == 'Yes'
    environment: dev
    outputs:
      deployment_duration_seconds: ${{ steps.destroy_apply.outputs.deployment_duration_seconds }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${TF_STATE_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TF_STATE_CONTAINER}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="use_azuread_auth=true"

      - name: Download reviewed destroy plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-dev-destroy-plan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Confirm reviewed destroy plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          DESTROY_MODE: ${{ github.event.inputs.destroy_mode }}
          DESTROY_COUNT: ${{ needs.destroy_plan.outputs.destroy_count }}
        run: |
          {
            echo "### Terraform DEV Destroy Apply Confirmation"
            echo ""
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Selected destroy mode | ${DESTROY_MODE} |"
            echo "| Reviewed resources to destroy | ${DESTROY_COUNT} |"
            echo ""
            echo "The apply job will apply the reviewed destroy plan artifact generated in Stage 1."
            echo ""
            echo "#### Reviewed plan summary"
            cat destroy-plan-summary.md
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Terraform apply reviewed destroy plan
        id: destroy_apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          START_TIME=$(date +%s)
          terraform apply -auto-approve -lock-timeout="${TF_LOCK_TIMEOUT}" dev-destroy.tfplan
          END_TIME=$(date +%s)
          echo "deployment_duration_seconds=$((END_TIME - START_TIME))" >> "${GITHUB_OUTPUT}"

  notify_destroy:
    name: "Stage 3 - Slack Destroy Notification"
    runs-on: ubuntu-latest
    needs:
      - destroy_plan
      - destroy_apply
    if: github.event.inputs.confirm_destroy == 'Yes' && always()
    steps:
      - name: Send Slack destroy result notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PLAN_RESULT: ${{ needs.destroy_plan.result }}
          APPLY_RESULT: ${{ needs.destroy_apply.result }}
          DESTROY_COUNT: ${{ needs.destroy_plan.outputs.destroy_count }}
          DESTROY_MODE: ${{ needs.destroy_plan.outputs.destroy_mode }}
          DURATION: ${{ needs.destroy_apply.outputs.deployment_duration_seconds }}
        run: |
          STATUS="SUCCESS"
          MESSAGE="Terraform DEV destroy completed successfully."
          FAILED_STAGE=""

          if [ "${PLAN_RESULT}" = "failure" ]; then
            STATUS="FAILED"
            MESSAGE="Terraform DEV destroy failed."
            FAILED_STAGE="Destroy Plan"
          elif [ "${APPLY_RESULT}" = "failure" ]; then
            STATUS="FAILED"
            MESSAGE="Terraform DEV destroy failed."
            FAILED_STAGE="Destroy Apply"
          elif [ "${APPLY_RESULT}" = "skipped" ]; then
            STATUS="SKIPPED"
            MESSAGE="Terraform DEV destroy apply was skipped."
            FAILED_STAGE="Destroy Apply"
          fi

          jq -n \
            --arg environment "DEV" \
            --arg status "${STATUS}" \
            --arg message "${MESSAGE}" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg commit "${GITHUB_SHA}" \
            --arg workflow_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg failed_stage "${FAILED_STAGE}" \
            --arg mode "${DESTROY_MODE:-${{ github.event.inputs.destroy_mode }}}" \
            --arg destroyed "${DESTROY_COUNT:-0}" \
            --arg duration "${DURATION:-0}s" \
            '{
              text: $message,
              blocks: [
                {type: "header", text: {type: "plain_text", text: ("Terraform Destroy - " + $status)}},
                {type: "section", fields: [
                  {type: "mrkdwn", text: "*Environment:*\n\($environment)"},
                  {type: "mrkdwn", text: "*Status:*\n\($status)"},
                  {type: "mrkdwn", text: "*Repository:*\n\($repository)"},
                  {type: "mrkdwn", text: "*Commit:*\n\($commit)"},
                  {type: "mrkdwn", text: "*Destroy Mode:*\n\($mode)"},
                  {type: "mrkdwn", text: "*Resources Destroyed:*\n\($destroyed)"},
                  {type: "mrkdwn", text: "*Duration:*\n\($duration)"},
                  {type: "mrkdwn", text: "*Failed/Skipped Stage:*\n\($failed_stage)"}
                ]},
                {type: "actions", elements: [
                  {type: "button", text: {type: "plain_text", text: "View workflow"}, url: $workflow_url}
                ]}
              ]
            }' > slack-payload.json
          curl -fsS -X POST -H "Content-Type: application/json" --data @slack-payload.json "${SLACK_WEBHOOK_URL}"
